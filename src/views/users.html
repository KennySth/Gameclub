<!-- Fragmento: Gestión de Usuarios (Alexander Smith) - Rediseño Bootstrap 5 -->
<div class="users-view container-fluid animate__animated animate__fadeIn">
    
    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="card-header bg-white py-3 border-bottom border-light d-flex justify-content-between align-items-center">
            <h5 class="card-title fw-bold mb-0 text-dark">
                <i class="bi bi-people text-primary me-2"></i> Gestión de Usuarios y Roles
            </h5>
            <button id="btn-add-user" class="btn btn-primary btn-sm d-flex align-items-center gap-2">
                <i class="bi bi-person-plus-fill"></i> <span>Nuevo Usuario</span>
            </button>
        </div>
        
        <div class="card-body p-4">
            <div class="table-responsive rounded-3 border">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light text-muted small text-uppercase">
                        <tr>
                            <th class="ps-4">Nombre Completo</th>
                            <th>Usuario</th>
                            <th>Rol / Permisos</th>
                            <th>Estado</th>
                            <th class="text-end pe-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body" class="border-top-0">
                        <!-- Filas cargadas dinámicamente -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal para Agregar/Editar Usuario (Estructura Bootstrap) -->
    <div id="user-modal" class="modal-overlay" style="display: none;">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 500px;">
            <div class="modal-content shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="modal-header bg-gaming-dark text-white p-4">
                    <h5 class="modal-title fw-bold" id="user-modal-title">Agregar Usuario</h5>
                    <button type="button" class="btn-close btn-close-white" id="btn-close-user-modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 bg-light">
                    <form id="user-form">
                        <input type="hidden" id="user-username-original">
                        
                        <div class="row g-3">
                            <div class="col-md-12">
                                <div class="form-floating mb-3">
                                    <input type="text" id="user-fullname" class="form-control" placeholder="Nombre Completo" required>
                                    <label for="user-fullname">Nombre Completo</label>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-floating mb-3">
                                    <input type="text" id="user-username" class="form-control" placeholder="Usuario" required>
                                    <label for="user-username">Nombre de Usuario (Login)</label>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-floating mb-3">
                                    <input type="password" id="user-password" class="form-control" placeholder="Contraseña" required>
                                    <label for="user-password">Contraseña</label>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-floating mb-3">
                                    <select id="user-role" class="form-select" required>
                                        <option value="admin_general">Administrador General</option>
                                        <option value="admin_almacen">Administrador Almacén</option>
                                        <option value="cajero">Cajero</option>
                                    </select>
                                    <label for="user-role">Rol de Acceso</label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="button" class="btn btn-light flex-grow-1 py-3 fw-semibold" onclick="document.getElementById('btn-close-user-modal').click()">Cancelar</button>
                            <button type="submit" class="btn btn-primary flex-grow-1 py-3 fw-semibold">Guardar Cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
/* Reusando overlay para consistencia */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
}

.role-badge {
    padding: 0.4rem 0.8rem;
    border-radius: 50px;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.role-admin-general { background-color: rgba(123, 44, 191, 0.1); color: #7b2cbf; border: 1px solid rgba(123, 44, 191, 0.2); }
.role-admin-almacen { background-color: rgba(0, 150, 255, 0.1); color: #0096ff; border: 1px solid rgba(0, 150, 255, 0.2); }
.role-cajero { background-color: rgba(5, 205, 153, 0.1); color: #05cd99; border: 1px solid rgba(5, 205, 153, 0.2); }

.status-active { color: #05cd99; }
</style>
