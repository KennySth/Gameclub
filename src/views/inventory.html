<!-- Fragmento: Inventario / Stock (Kenny Sthiven) - Rediseño Bootstrap 5 -->
<div class="inventory-view container-fluid animate__animated animate__fadeIn">
    
    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="card-header bg-white py-3 border-bottom border-light d-flex justify-content-between align-items-center">
            <h5 class="card-title fw-bold mb-0 text-dark">
                <i class="bi bi-box-seam text-primary me-2"></i> Gestión de Inventario
            </h5>
            <div class="d-flex gap-2">
                <button id="btn-scan-barcode-inv" class="btn btn-outline-primary btn-sm d-flex align-items-center gap-2">
                    <i class="bi bi-camera"></i> <span class="d-none d-md-inline">Escanear Barra</span>
                </button>
                <button id="btn-add-product" class="btn btn-primary btn-sm d-flex align-items-center gap-2">
                    <i class="bi bi-plus-lg"></i> <span>Nuevo Producto</span>
                </button>
            </div>
        </div>
        
        <div class="card-body p-4">
            <!-- Filtros y Búsqueda -->
            <div class="row g-3 mb-4">
                <div class="col-md-8">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text" id="inventory-search" class="form-control border-start-0 ps-0" placeholder="Buscar por nombre o ID del producto...">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted">
                            <i class="bi bi-filter"></i>
                        </span>
                        <select id="filter-category" class="form-select border-start-0 ps-0">
                            <option value="all">Todas las Categorías</option>
                            <option value="Consolas">Consolas</option>
                            <option value="Videojuegos">Videojuegos</option>
                            <option value="Accesorios">Accesorios</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Tabla de Inventario -->
            <div class="table-responsive rounded-3 border">
                <table class="table table-hover align-middle mb-0" id="inventory-table">
                    <thead class="table-light text-muted small text-uppercase">
                        <tr>
                            <th class="ps-4">Imagen</th>
                            <th>ID</th>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Estado</th>
                            <th class="text-end pe-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-body" class="border-top-0">
                        <!-- Filas cargadas dinámicamente -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal para Agregar/Editar (Estructura Bootstrap) -->
    <div id="product-modal" class="modal-overlay" style="display: none;">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 550px;">
            <div class="modal-content shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="modal-header bg-gaming-dark text-white p-4">
                    <h5 class="modal-title fw-bold" id="modal-title">Agregar Producto</h5>
                    <button type="button" class="btn-close btn-close-white" id="btn-close-modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 bg-light">
                    <form id="product-form">
                        <input type="hidden" id="prod-id-original">
                        
                        <div class="row g-3">
                            <div class="col-md-12">
                                <div class="form-floating mb-3">
                                    <input type="text" id="prod-id" class="form-control" placeholder="PROD-000" required>
                                    <label for="prod-id">Código / ID Producto</label>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-floating mb-3">
                                    <input type="text" id="prod-name" class="form-control" placeholder="Nombre" required>
                                    <label for="prod-name">Nombre del Producto</label>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-floating mb-3">
                                    <select id="prod-category" class="form-select">
                                        <option value="Consolas">Consolas</option>
                                        <option value="Videojuegos">Videojuegos</option>
                                        <option value="Accesorios">Accesorios</option>
                                    </select>
                                    <label for="prod-category">Categoría</label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-floating mb-3">
                                    <input type="number" id="prod-price" class="form-control" step="0.01" placeholder="0.00" required>
                                    <label for="prod-price">Precio (S/)</label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-floating mb-3">
                                    <input type="number" id="prod-stock" class="form-control" placeholder="0" required>
                                    <label for="prod-stock">Stock Actual</label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-floating mb-3">
                                    <input type="number" id="prod-min" class="form-control" value="5" placeholder="5">
                                    <label for="prod-min">Stock Mínimo</label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="button" class="btn btn-light flex-grow-1 py-3 fw-semibold" onclick="document.getElementById('btn-close-modal').click()">Cancelar</button>
                            <button type="submit" class="btn btn-primary flex-grow-1 py-3 fw-semibold">Guardar Cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Simulación de Escaneo -->
    <div id="scanner-visual-modal" class="modal-overlay" style="display: none;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-primary border-2 shadow-lg rounded-4 overflow-hidden">
                <div class="p-4 border-bottom border-secondary d-flex justify-content-between align-items-center">
                    <h5 class="m-0 text-primary fw-bold" style="letter-spacing: 2px;">LECTOR LÁSER ACTIVO</h5>
                    <button class="btn btn-sm btn-outline-light border-0" id="btn-close-scanner">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
                
                <div class="modal-body p-4 text-center">
                    <div class="scanner-container-bs rounded-3 bg-black mb-4 d-flex align-items-center justify-content-center overflow-hidden position-relative" style="height: 180px;">
                        <div class="scanner-laser"></div>
                        <div class="barcode-placeholder-bs opacity-25 display-1">|| ||| | |||| |</div>
                    </div>

                    <div id="scanner-status" class="font-monospace small mb-2 text-success">
                        BUSCANDO CÓDIGO DE BARRAS...
                    </div>
                    <div class="progress" style="height: 4px; background-color: #333;">
                        <div id="scanner-progress" class="progress-bar bg-primary progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
/* Overlay para simular modales Bootstrap sin depender del JS de Bootstrap para el toggle */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
}

.table th {
    font-size: 0.75rem !important;
    background-color: #f8f9fa !important;
}

.scanner-laser {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: var(--game-accent);
    box-shadow: 0 0 15px var(--game-accent);
    z-index: 10;
    animation: scanning-bs 2s infinite ease-in-out;
}

@keyframes scanning-bs {
    0% { top: 0; }
    50% { top: 100%; }
    100% { top: 0; }
}

.badge-pill-status {
    padding: 0.4rem 0.8rem;
    border-radius: 50px;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
}

.status-optimo { background-color: rgba(5, 205, 153, 0.1); color: var(--game-success); }
.status-stock-bajo { background-color: rgba(255, 181, 71, 0.1); color: var(--game-warning); }
.status-agotado { background-color: rgba(238, 93, 80, 0.1); color: var(--game-danger); }
</style>
