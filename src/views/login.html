<!-- Login Reconstruido: Estructura Simplificada y Validación Nativa -->
<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-gaming-dark p-3">
    
    <!-- Card de Acceso con Ancho Máximo Controlado -->
    <div class="card shadow-lg border-0 rounded-4 overflow-hidden w-100" style="max-width: 420px;">
        <div class="card-body p-4 p-sm-5">
            
            <!-- Branding / Header -->
            <div class="text-center mb-4">
                <div class="bg-primary bg-opacity-10 d-inline-block p-4 rounded-circle mb-3">
                    <i class="bi bi-controller display-3 text-primary"></i>
                </div>
                <h2 class="h2 fw-bold text-dark mb-1">GameLab</h2>
                <p class="text-muted small">Panel de Gestión Centralizada</p>
            </div>

            <!-- Formulario de Acceso -->
            <form id="login-form" class="needs-validation" novalidate>
                <!-- Input Usuario -->
                <div class="form-floating mb-3">
                    <input type="text" class="form-control border-light-subtle" id="username" placeholder="usuario" required autocomplete="username">
                    <label for="username" class="text-secondary">
                        <i class="bi bi-person-fill me-2"></i>Nombre de Usuario
                    </label>
                    <div class="invalid-feedback">Por favor, ingrese su usuario.</div>
                </div>
                
                <!-- Input Password -->
                <div class="form-floating mb-4">
                    <input type="password" class="form-control border-light-subtle" id="password" placeholder="contraseña" required autocomplete="current-password">
                    <label for="password" class="text-secondary">
                        <i class="bi bi-lock-fill me-2"></i>Contraseña
                    </label>
                    <div class="invalid-feedback">Por favor, ingrese su contraseña.</div>
                </div>

                <!-- Botón de Acción -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold py-3 shadow-sm border-0 d-flex align-items-center justify-content-center gap-2">
                        Iniciar Sesión <i class="bi bi-box-arrow-in-right fs-4"></i>
                    </button>
                </div>

                <!-- Mensaje de Error (Alternativo a feedback nativo para credenciales incorrectas) -->
                <div id="login-error-msg" class="text-danger small mt-3 text-center d-none">
                    <i class="bi bi-exclamation-circle me-1"></i> Credenciales inválidas.
                </div>
            </form>

        </div>
    </div>

    <!-- Footer Flotante -->
    <div class="position-absolute bottom-0 w-100 text-center pb-3">
        <p class="text-white-50 small mb-0">&copy; 2026 GameLab - Sistema de Control</p>
    </div>
</div>
