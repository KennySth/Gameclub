<!-- Fragmento: Dashboard (Fabricio Alexander) -->
<div class="dashboard-view">
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon" style="color: var(--accent-color);">💰</div>
            <div class="stat-info">
                <span class="label">Ventas del Día</span>
                <span class="value" id="stat-daily-sales">S/ 0.00</span>
                <span class="change positive">+12.5%</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="color: var(--info);">🛒</div>
            <div class="stat-info">
                <span class="label">Transacciones</span>
                <span class="value" id="stat-transactions">0</span>
                <span class="change positive">+4</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="color: var(--success);">📦</div>
            <div class="stat-info">
                <span class="label">Productos en Stock</span>
                <span class="value" id="stat-total-stock">0</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="color: var(--danger);">⚠️</div>
            <div class="stat-info">
                <span class="label">Alertas de Stock</span>
                <span class="value" id="stat-alerts">0</span>
            </div>
        </div>
    </div>

    <div class="dashboard-content">
        <div class="card recent-sales-card">
            <div class="card-header">
                <h3 class="card-title">Ventas Recientes</h3>
            </div>
            <div class="table-responsive">
                <table id="recent-sales-table">
                    <thead>
                        <tr>
                            <th>ID Transacción</th>
                            <th>Fecha</th>
                            <th>Total</th>
                            <th>Método</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="recent-sales-body">
                        <!-- Cargado dinámicamente -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card alerts-card">
            <div class="card-header">
                <h3 class="card-title">Alertas de Inventario</h3>
            </div>
            <div class="alerts-list" id="dashboard-alerts-list">
                <!-- Alertas dinámicas -->
            </div>
        </div>
    </div>
</div>

<style>
.dashboard-content {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 30px;
}

.alerts-list {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.alert-item {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 15px;
    background-color: var(--primary-bg);
    border-radius: 12px;
}

.alert-item .icon { font-size: 20px; }
.alert-item .info .name { font-weight: 600; display: block; }
.alert-item .info .stock { font-size: 12px; color: var(--text-muted); }

@media (max-width: 1200px) {
    .dashboard-content {
        grid-template-columns: 1fr;
    }
}
</style>
